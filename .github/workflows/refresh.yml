name: Refresh league data

on:
  # Tuesdays at 14:00 UTC (≈ 10am ET) during the season — Sep 1 → Feb 1
  schedule:
    - cron: "0 14 * 9-12 2"
    - cron: "0 14 * 1 2"
  # Allow manual runs
  workflow_dispatch:
    inputs:
      year:
        description: "Override CURRENT_YEAR (last completed season)"
        required: false
      next_year:
        description: "Override NEXT_YEAR (upcoming draft, for ADP)"
        required: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          SWID: ${{ secrets.SWID }}
          CURRENT_YEAR: ${{ inputs.year }}
          NEXT_YEAR: ${{ inputs.next_year }}
        run: python -m pipeline.build

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh league data ($(date -u +%Y-%m-%d))"
            git push
          fi
